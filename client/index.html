<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChapterAI — AI-Powered YouTube Chapter Generator</title>
  <meta name="description" content="Paste any YouTube URL and get AI-generated chapters instantly. ChapterAI analyses video transcripts to create precise, topic-based chapters." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Roboto+Flex:opsz,wght@8..144,400;8..144,500;8..144,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface": "#131313",
            "surface-dim": "#131313",
            "surface-bright": "#3a3939",
            "surface-variant": "#353534",
            "surface-tint": "#ffb4a8",
            "surface-container-lowest": "#0e0e0e",
            "surface-container-low": "#1c1b1b",
            "surface-container": "#201f1f",
            "surface-container-high": "#2a2a2a",
            "surface-container-highest": "#353534",
            "background": "#131313",
            "on-surface": "#e5e2e1",
            "on-surface-variant": "#ebbbb4",
            "on-background": "#e5e2e1",
            "primary": "#ffb4a8",
            "primary-container": "#ff5540",
            "primary-fixed": "#ffdad4",
            "primary-fixed-dim": "#ffb4a8",
            "on-primary": "#690100",
            "on-primary-container": "#5c0000",
            "on-primary-fixed": "#410000",
            "on-primary-fixed-variant": "#930100",
            "inverse-primary": "#c00100",
            "secondary": "#c8c6c5",
            "secondary-container": "#474746",
            "secondary-fixed": "#e5e2e1",
            "secondary-fixed-dim": "#c8c6c5",
            "on-secondary": "#303030",
            "on-secondary-container": "#b7b5b4",
            "on-secondary-fixed": "#1b1c1c",
            "on-secondary-fixed-variant": "#474746",
            "tertiary": "#acc7ff",
            "tertiary-container": "#488fff",
            "tertiary-fixed": "#d7e2ff",
            "tertiary-fixed-dim": "#acc7ff",
            "on-tertiary": "#002f67",
            "on-tertiary-container": "#00285b",
            "on-tertiary-fixed": "#001a40",
            "on-tertiary-fixed-variant": "#004491",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "on-error": "#690005",
            "on-error-container": "#ffdad6",
            "outline": "#b18780",
            "outline-variant": "#603e39",
            "inverse-surface": "#e5e2e1",
            "inverse-on-surface": "#313030",
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            "margin-desktop": "72px",
            lg: "24px",
            "margin-mobile": "16px",
            md: "16px",
            sm: "8px",
            gutter: "12px",
            xs: "4px",
            xl: "32px",
            base: "4px"
          },
          fontFamily: {
            timestamp: ["JetBrains Mono", "monospace"],
            h1: ["Roboto Flex", "sans-serif"],
            label: ["Roboto Flex", "sans-serif"],
            meta: ["Roboto Flex", "sans-serif"],
            body: ["Roboto Flex", "sans-serif"],
            h2: ["Roboto Flex", "sans-serif"]
          },
          fontSize: {
            timestamp: ["12px", { lineHeight: "1", fontWeight: "500" }],
            h1: ["24px", { lineHeight: "1.2", fontWeight: "700" }],
            label: ["14px", { lineHeight: "1.2", fontWeight: "500" }],
            meta: ["12px", { lineHeight: "1.2", fontWeight: "400" }],
            body: ["14px", { lineHeight: "1.5", fontWeight: "400" }],
            h2: ["20px", { lineHeight: "1.2", fontWeight: "700" }]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #717171; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d3d3d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
